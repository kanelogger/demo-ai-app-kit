<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}周报管理系统{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    
    <!-- Select2 -->
    <link href="https://cdn.bootcdn.net/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36CFC9',
                        success: '#52C41A',
                        warning: '#FAAD14',
                        danger: '#FF4D4F',
                        info: '#1890FF',
                        light: '#F5F5F5',
                        dark: '#1D2129',
                        'gray-100': '#F2F3F5',
                        'gray-200': '#E5E6EB',
                        'gray-300': '#C9CDD4',
                        'gray-400': '#86909C',
                        'gray-500': '#4E5969',
                        'gray-600': '#272E3B',
                        'gray-700': '#1D2129'
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif']
                    },
                    boxShadow: {
                        'card': '0 2px 8px rgba(0, 0, 0, 0.08)',
                        'dropdown': '0 4px 16px rgba(0, 0, 0, 0.12)'
                    }
                }
            }
        };
    </script>
    
    <!-- Custom Styles -->
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .sidebar-item-active {
                @apply bg-primary/10 text-primary border-l-4 border-primary;
            }
            .sidebar-item {
                @apply flex items-center px-4 py-3 text-gray-500 hover:bg-gray-100 transition-all duration-200 cursor-pointer;
            }
            .btn-primary {
                @apply bg-primary text-white px-4 py-2 rounded-md hover:bg-primary/90 transition-all duration-200 shadow-sm;
            }
            .btn-secondary {
                @apply bg-white text-primary border border-primary px-4 py-2 rounded-md hover:bg-primary/5 transition-all duration-200;
            }
            .btn-outline {
                @apply bg-white text-gray-500 border border-gray-200 px-4 py-2 rounded-md hover:bg-gray-50 transition-all duration-200;
            }
            .card {
                @apply bg-white rounded-lg shadow-card p-5 transition-all duration-200 hover:shadow-lg;
            }
            .form-input {
                @apply w-full px-3 py-2 border border-gray-200 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all duration-200;
            }
            .form-select {
                @apply w-full px-3 py-2 border border-gray-200 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all duration-200 appearance-none bg-white;
            }
            .form-label {
                @apply block text-sm font-medium text-gray-700 mb-1;
            }
            .badge {
                @apply px-2 py-1 rounded-full text-xs font-medium;
            }
            .badge-primary {
                @apply bg-primary/10 text-primary;
            }
            .badge-success {
                @apply bg-success/10 text-success;
            }
            .badge-warning {
                @apply bg-warning/10 text-warning;
            }
            .badge-danger {
                @apply bg-danger/10 text-danger;
            }
            .badge-gray {
                @apply bg-gray-100 text-gray-500;
            }
            .table-th {
                @apply px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider bg-gray-50;
            }
            .table-td {
                @apply px-4 py-3 whitespace-nowrap text-sm text-gray-700;
            }
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="font-inter bg-gray-100 text-gray-700 min-h-screen flex flex-col overflow-hidden">
    {% block body %}{% endblock %}
    
    {% block extra_js %}{% endblock %}
</body>
</html>
