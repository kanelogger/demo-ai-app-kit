{% extends "base.html" %}

{% block body %}
<!-- 顶部导航栏 -->
<header class="bg-white shadow-sm z-10 relative">
    <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <div class="flex-shrink-0 flex items-center">
                    <i class="fas fa-layer-group text-primary text-2xl mr-2"></i>
                    <span class="text-xl font-semibold text-gray-700">业务后台管理系统</span>
                </div>
            </div>
            <div class="flex items-center">
                <div class="ml-3 relative">
                    <div class="flex items-center cursor-pointer group" id="userMenuButton">
                        <div class="h-8 w-8 rounded-full bg-primary/10 flex items-center justify-center text-primary font-medium">
                            {{ (session.name or 'U')[0] }}
                        </div>
                        <div class="ml-2 hidden md:block">
                            <div class="text-sm font-medium text-gray-700">{{ session.name or '管理员' }}</div>
                            <div class="text-xs text-gray-500">{{ session.role or 'admin' }}</div>
                        </div>
                        <i class="fas fa-chevron-down ml-1 text-xs text-gray-400 group-hover:text-primary transition-colors duration-200"></i>
                    </div>
                    <div class="hidden origin-top-right absolute right-0 mt-2 w-48 rounded-md shadow-dropdown bg-white ring-1 ring-black ring-opacity-5 z-50" id="userDropdownMenu">
                        <div class="py-1">
                            <a href="{{ url_for('logout') }}" class="block px-4 py-2 text-sm text-danger hover:bg-gray-100">
                                <i class="fas fa-sign-out-alt mr-2"></i>
                                退出登录
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- 主内容区域 -->
<div class="flex flex-1 overflow-hidden">
    <!-- 侧边栏 -->
    <aside class="bg-white w-64 border-r border-gray-200 flex-shrink-0 hidden lg:block transition-all duration-300 ease-in-out" id="sidebar">
        <div class="h-full flex flex-col">
            <nav class="flex-1 overflow-y-auto p-2" id="sidebarMenu">
                <div class="mb-4">
                    <div class="sidebar-item {% if request.endpoint == 'dashboard' %}sidebar-item-active{% endif %}" data-url="{{ url_for('dashboard') }}">
                        <i class="fas fa-home w-5 text-center mr-3"></i>
                        <span>系统首页</span>
                    </div>
                </div>
                <!-- Business menus are added during implementation by the Agent. -->
            </nav>
            <div class="p-4 border-t border-gray-200">
                <div class="text-center text-xs text-gray-500">
                    <p>业务后台管理系统</p>
                    <p class="mt-1">Skeleton v1.0.0</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- 主内容 -->
    <main class="flex-1 overflow-y-auto bg-gray-50 p-6" id="mainContent">
        {% block content %}{% endblock %}
    </main>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    var userMenuButton = document.getElementById('userMenuButton');
    var userDropdownMenu = document.getElementById('userDropdownMenu');
    if (userMenuButton && userDropdownMenu) {
        userMenuButton.addEventListener('click', function () {
            userDropdownMenu.classList.toggle('hidden');
        });
        document.addEventListener('click', function (event) {
            if (!userMenuButton.contains(event.target) && !userDropdownMenu.contains(event.target)) {
                userDropdownMenu.classList.add('hidden');
            }
        });
    }

    document.querySelectorAll('.sidebar-item').forEach(function (item) {
        item.addEventListener('click', function () {
            var url = this.getAttribute('data-url');
            if (url) {
                window.location.href = url;
            }
        });
    });
});
</script>
{% endblock %}
